name: Java CI with Gradle

# 3.1. Déclenchement sur chaque push ou pull request vers la branche principale
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]



jobs:
  build:

  
    runs-on: ubuntu-latest
    
    # 4. Stratégie de matrice pour tester sur différents OS
   # strategy:
   #   matrix:
      #  os: [ubuntu-latest, macos-latest, windows-latest]
    # 3.2. Permissions restreintes (Principe du moindre privilège)
# On n'autorise que la lecture du contenu pour cloner le code.

    permissions:
      contents: read
      
    env:
      DISPLAY: ":99.0"
      
    services:
      xvfb:
        image: selenium/standalone-chrome:latest
        options: -e VNC_SERVER=true -e VNC_PORT=5900

    steps:
      # 3.4. Utilisation de la dernière version de actions/checkout (v4)
      # 3.3 & 3.4. Configuration du JDK version 24 (dernière version de setup-java)
    - uses: actions/checkout@v6
    - name: Set up JDK 24 
      uses: actions/setup-java@v5
        
      with:
        java-version: '24'
        distribution: 'temurin' # Distribution recommandée par l'industrie

      # Configuration de Xvfb (nécessaire pour les tests GUI mentionnés dans vos "Useful hints")
      # Note : Uniquement nécessaire sur Linux (ubuntu)
    - name: Start Xvfb 
      run: Xvfb $DISPLAY -ac -screen 0 1600x1200x24 > /dev/null 2>&1 &

      # 3.6. Setup Gradle sans utiliser le Wrapper du projet
      # On utilise la dernière version de l'action officielle et une version stable de Gradle
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
         gradle-version: current # Utilisez la dernière version stable de Gradle

      # Exécution du build et des test
      # L'environnement DISPLAY est ajouté ici pour les tests graphiques
    - name: Build with Gradle
      run: gradle build
        
   

      # 5. [Reporting] Publication du rapport de test en tant qu'Artéfact
      # On utilise "if: always()" pour avoir le rapport même si les tests échouent
    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: test-report-ubuntu
        path: app/build/reports/tests/test

